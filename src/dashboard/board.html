<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cachable UI - Tableau de bord</title>
    <style>
        * {
            color: #fff;
        }

        body {
            background-color: #141020;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #stats_div {
            width: 100%;
            display: inline-flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            /* justify-content:stretch;
            align-items: stretch;
            align-content: stretch; */
            gap: 8px;
        }

        .one_stat_div {
            background-color: #1f1932;
            border-radius: 8px;
            padding: 8px;
        }

        h1,
        h2 {
            color: #b197fc;
        }
    </style>
</head>

<body>
    <h1>Cachable UI</h1>
    <h2>Tableau de bord</h2>
    <div id="stats_div">
        <div class="one_stat_div">
            <h3>
                Pages sauvées
            </h3>
            4
        </div>
        <div class="one_stat_div">
            <h3>
                Noeuds sauvées
            </h3>
            16
        </div>
        <div class="one_stat_div">
            <h3>
                Mémoire utilisée
            </h3>
            253MB
        </div>
    </div>
</body>

</html>
